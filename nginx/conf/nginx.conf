worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;
    client_max_body_size 50m;
    client_body_temp_path C:/ai_erp_itac/nginx/temp/client_body_temp;
    proxy_temp_path       C:/ai_erp_itac/nginx/temp/proxy_temp;
    fastcgi_temp_path     C:/ai_erp_itac/nginx/temp/fastcgi_temp;
    uwsgi_temp_path       C:/ai_erp_itac/nginx/temp/uwsgi_temp;
    scgi_temp_path        C:/ai_erp_itac/nginx/temp/scgi_temp;

    server {
        listen       81;
        server_name  _;

        root   C:/ai_erp_itac/nginx/html;
        index  index.html;
        access_log C:/ai_erp_itac/nginx/logs/access.log;
        error_log  C:/ai_erp_itac/nginx/logs/error.log;

        location = / {
            return 302 /ai/;
        }

        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /ai/socket.io/ {
            proxy_pass http://127.0.0.1:8080/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ai/api/lab/ {
            proxy_pass http://127.0.0.1:8080/lab/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /ai/api/customer/list {
            proxy_pass http://127.0.0.1:8080/ai/api/customer/list;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ai/api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ai/ {
            try_files $uri $uri/ /ai/index.html;
        }
    }
}
